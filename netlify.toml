# Netlify configuration for PropSync Manager — UI Demo
# This deploys the web_dashboard as a read-only visual demo.
# Full functionality requires the local Python engine (main.py) running on Windows with MetaTrader 5.

[build]
  command = "echo 'Skipping Python build for static dashboard'"
  publish = "web_dashboard"

[build.environment]
  # Prevent Netlify from trying to install Python dependencies
  NETLIFY_SKIP_PYTHON_INSTALL = "true"
  PYTHON_VERSION = "3.11"


[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co;"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
